<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCode Editor</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d2d;
    --text: #d4d4d4;
    --accent: #4fc3f7;
    --border: #3c3c3c;
    --btn: #3a3a3a;
    --btn-hover: #4a4a4a;
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: var(--panel);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
 .logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }
 .file-name {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 14px;
    width: 160px;
  }
 .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
 .actions button {
    background: var(--btn);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s ease;
  }
 .actions button:hover {
    background: var(--btn-hover);
  }
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  textarea {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    padding: 14px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 14px;
    line-height: 1.6;
  }
  @media (max-width: 768px) {
    header { justify-content: center; }
   .file-name { width: 100%; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">QuickCode</div>
  <div class="actions">
    <button id="saveBtn">💾 Save</button>
    <button id="runBtn">▶ Run</button>
    <button id="downloadBtn">📥 Download</button>
    <button id="resetBtn">🔄 Reset</button>
  </div>
</header>

<main>
  <textarea id="codeArea" spellcheck="false" placeholder="Start coding here..."></textarea>
</main>

<script>
(function() {
  const codeArea = document.getElementById('codeArea');
  const saveBtn = document.getElementById('saveBtn');
  const runBtn = document.getElementById('runBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');

  const defaultCode = '<h1>Welcome to QuickCode</h1>\n<p>Write your code and click Run.</p>\n<button onclick="alert(\'Hello!\')">Click Me</button>';

  function safeGet() {
    try {
      const data = localStorage.getItem('qc_code');
      return data || defaultCode;
    } catch(e) {
      return defaultCode;
    }
  }

  function safeSet() {
    try {
      localStorage.setItem('qc_code', codeArea.value);
    } catch(e) {
      console.log('Storage not available');
    }
  }

  function loadCode() {
    codeArea.value = safeGet();
  }

  codeArea.addEventListener('input', function() {
    safeSet();
  });

  saveBtn.addEventListener('click', function() {
    safeSet();
    alert('Code Saved!');
  });

  runBtn.addEventListener('click', function() {
    safeSet();
    const code = codeArea.value;
    const type = prompt('Run as which type?\nType: html, css, or js', 'html');
    if (!type) return;
    const ext = type.toLowerCase();
    let blob, url;

    if (ext === 'html') {
      const full = `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n<title>QuickCode</title>\n</head>\n<body>\n${code}\n</body>\n</html>`;
      blob = new Blob([full], { type: 'text/html' });
    } else if (ext === 'css') {
      blob = new Blob([code], { type: 'text/css' });
    } else if (ext === 'js') {
      blob = new Blob([code], { type: 'application/javascript' });
    } else {
      alert('Invalid type. Use html, css, or js');
      return;
    }

    url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  });

  downloadBtn.addEventListener('click', function() {
    safeSet();
    const type = prompt('Download as which type?\nType: html, css, or js', 'html');
    if (!type) return;
    const ext = type.toLowerCase();
    const code = codeArea.value;
    let blob, filename = 'code.' + ext;

    if (ext === 'html') {
      const full = `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n<title>QuickCode</title>\n</head>\n<body>\n${code}\n</body>\n</html>`;
      blob = new Blob([full], { type: 'text/html' });
    } else if (ext === 'css') {
      blob = new Blob([code], { type: 'text/css' });
    } else if (ext === 'js') {
      blob = new Blob([code], { type: 'application/javascript' });
    } else {
      alert('Invalid type. Use html, css, or js');
      return;
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  resetBtn.addEventListener('click', function() {
    if (confirm('Reset code? This cannot be undone.')) {
      try { localStorage.clear(); } catch(e) {}
      codeArea.value = defaultCode;
      safeSet();
    }
  });

  loadCode();
})();
</script>
</body>
</html>
