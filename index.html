<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodePlay Editor</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d2d;
    --text: #d4d4d4;
    --accent: #4fc3f7;
    --border: #3c3c3c;
    --btn: #3a3a3a;
    --btn-hover: #4a4a4a;
    --tab-active: #1e1e1e;
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: var(--panel);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
 .logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
 .actions {
    display: flex;
    gap: 8px;
  }
 .actions button {
    background: var(--btn);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s ease;
  }
 .actions button:hover {
    background: var(--btn-hover);
  }
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
 .editor,.preview {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
 .tabs {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
 .tab {
    padding: 10px 16px;
    cursor: pointer;
    background: var(--panel-2);
    border-right: 1px solid var(--border);
    font-size: 14px;
    transition: background 0.2s ease;
  }
 .tab.active {
    background: var(--tab-active);
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
  }
 .editor-area {
    flex: 1;
    position: relative;
    background: var(--bg);
  }
 .editor-pane {
    width: 100%;
    height: 100%;
    display: none;
  }
 .editor-pane.active {
    display: block;
  }
  textarea {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    padding: 12px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 14px;
    line-height: 1.5;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #ffffff;
  }
  @media (max-width: 768px) {
    main {
      flex-direction: column;
    }
   .editor,.preview {
      width: 100%;
      height: 50%;
    }
  }
</style>
</head>
<body>
<header>
  <div class="logo">CodePlay</div>
  <div class="actions">
    <button id="runBtn">▶ Run</button>
    <button id="downloadBtn">📥 Download</button>
    <button id="resetBtn">🗑 Reset</button>
    <button id="githubBtn">🌐 GitHub</button>
  </div>
</header>

<main>
  <section class="editor">
    <div class="tabs">
      <div class="tab active" data-tab="html">HTML</div>
      <div class="tab" data-tab="css">CSS</div>
      <div class="tab" data-tab="js">JavaScript</div>
    </div>
    <div class="editor-area">
      <div class="editor-pane active" id="pane-html">
        <textarea id="htmlCode" spellcheck="false"></textarea>
      </div>
      <div class="editor-pane" id="pane-css">
        <textarea id="cssCode" spellcheck="false"></textarea>
      </div>
      <div class="editor-pane" id="pane-js">
        <textarea id="jsCode" spellcheck="false"></textarea>
      </div>
    </div>
  </section>

  <section class="preview">
    <iframe id="previewFrame"></iframe>
  </section>
</main>

<script>
(function() {
  const htmlEl = document.getElementById('htmlCode');
  const cssEl = document.getElementById('cssCode');
  const jsEl = document.getElementById('jsCode');
  const iframe = document.getElementById('previewFrame');
  const tabs = document.querySelectorAll('.tab');
  const panes = document.querySelectorAll('.editor-pane');
  const runBtn = document.getElementById('runBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');
  const githubBtn = document.getElementById('githubBtn');

  const defaultState = {
    html: '<h1>Welcome to CodePlay</h1>\n<p>Write HTML, CSS, and JavaScript and see live results instantly.</p>\n<button id="alertBtn">Click Me</button>',
    css: 'body {\n font-family: Arial, sans-serif;\n text-align: center;\n padding: 40px;\n background: #f5f5f5;\n}\n\nh1 {\n color: #2196f3;\n}\n\np {\n color: #555;\n}\n\n#alertBtn {\n padding: 10px 20px;\n border: 2px solid #2196f3;\n background: #fff;\n color: #2196f3;\n border-radius: 4px;\n cursor: pointer;\n}\n\n#alertBtn:hover {\n background: #2196f3;\n color: #fff;\n}',
    js: 'document.getElementById("alertBtn").addEventListener("click", function() {\n alert("Hello from CodePlay!");\n});'
  };

  let memoryState = {...defaultState };
  let useStorage = true;

  function safeGet(key) {
    try {
      const val = localStorage.getItem(key);
      return val!== null? val : null;
    } catch (e) {
      useStorage = false;
      return null;
    }
  }

  function safeSet(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {
      useStorage = false;
      memoryState[key.replace('editor_', '')] = value;
    }
  }

  function safeClear() {
    try {
      localStorage.removeItem('editor_html');
      localStorage.removeItem('editor_css');
      localStorage.removeItem('editor_js');
    } catch (e) {
      useStorage = false;
    }
    memoryState = {...defaultState };
  }

  function getState(key) {
    const stored = safeGet('editor_' + key);
    return stored!== null? stored : memoryState[key];
  }

  function setState(key, value) {
    safeSet('editor_' + key, value);
    memoryState[key] = value;
  }

  function loadInitial() {
    htmlEl.value = getState('html');
    cssEl.value = getState('css');
    jsEl.value = getState('js');
    runCode();
  }

  function runCode() {
    const html = htmlEl.value;
    const css = '<style>' + cssEl.value + '</style>';
    const js = '<script>' + jsEl.value + '<\/script>';
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(html + css + js);
    doc.close();
  }

  function debounce(fn, delay) {
    let t;
    return function() {
      clearTimeout(t);
      t = setTimeout(fn, delay);
    }
  }

  const debouncedRun = debounce(runCode, 300);

  htmlEl.addEventListener('input', function() {
    setState('html', htmlEl.value);
    debouncedRun();
  });
  cssEl.addEventListener('input', function() {
    setState('css', cssEl.value);
    debouncedRun();
  });
  jsEl.addEventListener('input', function() {
    setState('js', jsEl.value);
    debouncedRun();
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', function() {
      const target = this.dataset.tab;
      tabs.forEach(t => t.classList.remove('active'));
      panes.forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('pane-' + target).classList.add('active');
    });
  });

  runBtn.addEventListener('click', runCode);

  downloadBtn.addEventListener('click', function() {
    const html = htmlEl.value;
    const css = cssEl.value;
    const js = jsEl.value;
    const fullDoc = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Exported Page</title>\n<style>\n${css}\n</style>\n</head>\n<body>\n${html}\n<script>\n${js}\n<\/script>\n</body>\n</html>`;
    const blob = new Blob([fullDoc], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'index.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  resetBtn.addEventListener('click', function() {
    if (confirm('Are you sure you want to reset all code? This cannot be undone.')) {
      safeClear();
      htmlEl.value = defaultState.html;
      cssEl.value = defaultState.css;
      jsEl.value = defaultState.js;
      runCode();
    }
  });

  githubBtn.addEventListener('click', function() {
    window.open('https://github.com', '_blank', 'noopener,noreferrer');
  });

  loadInitial();
})();
</script>
</body>
</html>
