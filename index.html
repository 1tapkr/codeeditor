<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCode + Turbo AI v2</title>
<style>
  :root {
    --bg: #1e1e1e; --panel: #252526; --panel-2: #2d2d2d; --text: #d4d4d4;
    --accent: #4fc3f7; --border: #3c3c3c; --btn: #3a3a3a; --btn-hover: #4a4a4a;
    --turbo-on: #00ff88; --turbo-off: #ff4444;
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--panel); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
  .logo { font-size: 18px; font-weight: 600; color: var(--accent); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .actions button { background: var(--btn); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s ease; }
  .actions button:hover { background: var(--btn-hover); }
  #turboBtn { font-weight:bold; }
  #turboBtn.on { background: var(--turbo-on); color:#000; }
  #turboBtn.off { background: var(--turbo-off); color:#fff; }
  #aiToggleBtn { background: var(--accent); color:#000; font-weight:bold; }
  main { flex: 1; position: relative; }
  textarea { width: 100%; height: 100%; background: var(--bg); color: var(--text); border: none; outline: none; resize: none; padding: 14px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.5; }
  .ai-panel { position: absolute; bottom: 0; right: 0; width: 40%; height: 100%; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; z-index: 10; }
  .ai-panel.open { transform: translateX(0); }
  .panel-header { padding: 8px 12px; background: var(--panel-2); border-bottom: 1px solid var(--border); font-weight: 600; display:flex; justify-content:space-between; }
  .panel-header button { background:none; border:none; color:var(--text); font-size:18px; cursor:pointer; }
  .ai-chat { flex:1; padding:10px; overflow-y:auto; }
  .ai-input { display:flex; padding:10px; border-top:1px solid var(--border); gap:8px; }
  .ai-input input { flex:1; padding:8px; background:var(--panel-2); border:1px solid var(--border); color:var(--text); border-radius:4px; }
  .ai-input button { padding:8px 12px; background:var(--accent); border:none; color:#000; border-radius:4px; cursor:pointer; font-weight: 600; }
  .ai-msg { background:var(--panel-2); padding:10px; border-radius:6px; margin-bottom:8px; white-space:pre-wrap; font-size:13px; }
  .ai-msg.error { background:#3d2626; color:#ff6b6b; }
  .ai-msg.loading { background:#2d3526; color:#ffd700; font-style: italic; }
  .ai-msg button { float:right; font-size:12px; padding:2px 6px; cursor:pointer; background:var(--accent); color:#000; border:none; border-radius:3px; }
  @media (max-width: 900px) { .ai-panel { width: 100%; } }
</style>
</head>
<body>
<header>
  <div class="logo">QuickCode v2</div>
  <div class="actions">
    <button id="turboBtn" class="on">Turbo: ON</button>
    <button id="aiToggleBtn">🤖 AI</button>
    <button id="saveBtn">💾 Save</button>
    <button id="runBtn">▶ Run</button>
    <button id="downloadBtn">📥 Download</button>
    <button id="resetBtn">🔄 Reset</button>
  </div>
</header>

<main>
  <textarea id="codeArea" spellcheck="false" placeholder="Start coding here..."></textarea>
  <div class="ai-panel" id="aiPanel">
    <div class="panel-header">
      <span>⚡ Turbo AI - Llama 3.1</span>
      <button onclick="toggleAI()">×</button>
    </div>
    <div class="ai-chat" id="aiChat"></div>
    <div class="ai-input">
      <input id="aiMsg" placeholder="Code check karo... Enter dabao">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</main>

<script>
(function() {
  const API_KEY = "yaha_nayi_key_daalo"; // STEP 1: Isko change karo
  let turbo = true;
  let isLoading = false;

  const codeArea = document.getElementById('codeArea');
  const aiPanel = document.getElementById('aiPanel');
  const turboBtn = document.getElementById('turboBtn');
  const aiChat = document.getElementById('aiChat');

  const defaultCode = '<h1>Welcome to QuickCode v2</h1>\n<p>AI se pucho: "is code me error hai?"</p>\n<button onclick="alert(\'Hello!\')">Click Me</button>';

  function safeGet() { try { return localStorage.getItem('qc_code') || defaultCode; } catch(e) { return defaultCode; } }
  function safeSet() { try { localStorage.setItem('qc_code', codeArea.value); } catch(e) {} }
  function loadCode() { codeArea.value = safeGet(); }
  codeArea.addEventListener('input', safeSet);

  document.getElementById('saveBtn').onclick = () => { safeSet(); alert('Code Saved!'); };
  document.getElementById('runBtn').onclick = () => { safeSet(); window.open(URL.createObjectURL(new Blob([`<!DOCTYPE html><html><body>${codeArea.value}</body></html>`], {type:'text/html'})), '_blank'); };
  document.getElementById('downloadBtn').onclick = () => { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([codeArea.value],{type:'text/html'})); a.download='code.html'; a.click(); };
  document.getElementById('resetBtn').onclick = () => { if(confirm('Reset?')){localStorage.clear(); codeArea.value=defaultCode; safeSet();} };

  window.toggleAI = () => aiPanel.classList.toggle('open');
  document.getElementById('aiToggleBtn').onclick = toggleAI;

  turboBtn.onclick = () => {
    turbo = !turbo;
    turboBtn.innerText = "Turbo: " + (turbo ? "ON" : "OFF");
    turboBtn.className = turbo ? "on" : "off";
  };

  document.getElementById('aiMsg').addEventListener('keypress', e => { if(e.key==='Enter' && !isLoading) sendMsg(); });

  window.sendMsg = async () => {
    let userMsg = document.getElementById("aiMsg").value.trim();
    if(!userMsg || isLoading) return;
    if(API_KEY === "yaha_nayi_key_daalo"){
        alert("Bhai pehle API Key daal de line 3 me");
        return;
    }
    
    isLoading = true;
    addAIMsg("Tum: " + userMsg);
    document.getElementById("aiMsg").value = "";
    addAIMsg("⏳ Processing...", null, "loading");

    let model = turbo ? "llama-3.1-8b-instant" : "llama-3.1-70b-versatile"; // NAYA MODEL
    let max_tokens = turbo ? 200 : 600;
    let system_prompt = turbo
     ? `Tum code reviewer ho. Rule: Sirf 4 line. 1.Accha 2.Wajah 3.Sudhaar 4.Fixed Code in \`\`\``
      : `Tum senior developer ho. Detail me samjhao with code example.`;

    let full_prompt = `Current Code:\n${codeArea.value}\n\nUser Question: ${userMsg}`;

    try {
      let apiUrl = "https://api.groq.com/openai/v1/chat/completions";
      let proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(apiUrl); // YE FAST HAI
      
      let res = await fetch(proxyUrl, {
        method: "POST",
        headers: { 
          "Authorization": "Bearer " + API_KEY, 
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: model, 
          max_tokens: max_tokens,
          temperature: 0.7,
          messages: [
            {role: "system", content: system_prompt}, 
            {role: "user", content: full_prompt}
          ]
        })
      });

      removeLoadingMsg();

      if(!res.ok) {
        let errorData = await res.json().catch(()=>({}));
        addAIMsg(`❌ Error ${res.status}: ${errorData.error?.message || "API Error"}`, null, "error");
        isLoading = false;
        return;
      }

      let data = await res.json();
      let reply = data.choices[0].message.content;
      addAIMsg("AI: " + reply, reply);
    } catch(e) { 
      removeLoadingMsg();
      addAIMsg(`❌ Connection failed. Internet ya Proxy down hai`, null, "error");
    } finally {
      isLoading = false;
    }
  };

  function removeLoadingMsg() {
    let lastMsg = aiChat.lastElementChild;
    if(lastMsg && lastMsg.textContent.includes("⏳")) {
      lastMsg.remove();
    }
  }

  function addAIMsg(text, codeToCopy=null, msgType="normal") {
    let div = document.createElement('div'); 
    div.className = 'ai-msg ' + msgType;
    
    if(codeToCopy && codeToCopy.includes('```')){
      try {
        let codeBlocks = codeToCopy.match(/```([\s\S]*?)```/g);
        let code = codeBlocks ? codeBlocks[0].replace(/```/g, '') : codeToCopy;
        div.innerHTML = text + `<br><button onclick="copyCode(\`${code.replace(/`/g,'\\`')}\`)">📋 Copy</button>`;
      } catch(e) {
        div.innerText = text;
      }
    } else { 
      div.innerText = text; 
    }
    
    aiChat.appendChild(div); 
    aiChat.scrollTop = aiChat.scrollHeight;
  }
  
  window.copyCode = (code) => { 
    codeArea.value = code; 
    safeSet(); 
    alert('✅ Code paste ho gaya!'); 
  }

  loadCode();
})();
</script>
</body>
</html>
